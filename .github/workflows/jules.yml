name: Jules AI Agent

# Trigger when an issue is labeled or when an organization member mentions @jules
on:
  issues:
    types: [labeled, opened, edited]
  issue_comment:
    types: [created, edited]

jobs:
  jules:
    # Restrict execution to:
    # 1. Issues labeled 'jules'
    # 2. Issues created/edited by an org member mentioning '@jules'
    # 3. Issue comments created/edited by an org member mentioning '@jules'
    # (And ignore pull requests)
    if: >
      !github.event.issue.pull_request &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'jules') ||
        (
          github.event_name == 'issues' &&
          (github.event.action == 'opened' || github.event.action == 'edited') &&
          contains(github.event.issue.body, '@jules') &&
          contains(fromJson('["MEMBER", "OWNER"]'), github.event.issue.author_association)
        ) ||
        (
          github.event_name == 'issue_comment' &&
          (github.event.action == 'created' || github.event.action == 'edited') &&
          contains(github.event.comment.body, '@jules') &&
          contains(fromJson('["MEMBER", "OWNER"]'), github.event.comment.author_association)
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Run Jules
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            You are an AI agent for the CheckMeIn project. Before starting, read and follow CONSTITUTION.md. 

            Please diagnose and fix the following GitHub issue:

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Process:
            1. **Analysis** - Review the issue and identify the root cause
            2. **Diagnosis** - Trace the issue through the codebase
            3. **Fix** - Implement a minimal, targeted fix
            4. **Testing** - Add tests if appropriate
            5. **Documentation** - Add comments explaining the fix

            Constraints:
            - Follow the CONSTITUTION.md guidelines
            - Keep changes minimal and targeted
            - All existing tests must pass
            - In the PR title, include "Fixes #${{ github.event.issue.number }}"
            - In the PR description, include "Fixes #${{ github.event.issue.number }}" so the issue is automatically linked and closed when the PR is merged
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: 'main'
